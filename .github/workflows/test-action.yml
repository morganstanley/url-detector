name: Test URL Detector Action

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@15b44562098378d46e275c680d4363a39f2e2378 # v4.2.0

      - name: Run URL Detector on example files
        uses: ./ # Test against example directory if it exists
        with:
          scan-patterns: "examples/**/*"
          format: "json"
          output-file: "scan-results.json"